<svg width="900" height="500" viewBox="0 0 900 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="20" x2="780" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F7F2"/>
      <stop offset="1" stop-color="#F0EBE2"/>
    </linearGradient>
    <linearGradient id="panel" x1="130" y1="150" x2="770" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="rgba(255,255,255,0.20)"/>
      <stop offset="0.5" stop-color="rgba(255,255,255,0.36)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.20)"/>
    </linearGradient>
    <linearGradient id="arrow" x1="322" y1="250" x2="418" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7E899C"/>
      <stop offset="1" stop-color="#9CA7BA"/>
    </linearGradient>
    <filter id="panelShadow" x="78" y="120" width="744" height="180" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#596274" flood-opacity="0.12"/>
    </filter>
    <filter id="textShadow" x="0" y="0" width="900" height="500" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="white" flood-opacity="0.8"/>
    </filter>
  </defs>

  <rect width="900" height="500" rx="22" fill="url(#bg)"/>

  <g filter="url(#panelShadow)">
    <rect x="100" y="160" width="700" height="120" rx="28" fill="url(#panel)"/>
  </g>

  <path
    d="M322 250H418M418 250L390 222M418 250L390 278"
    stroke="url(#arrow)"
    stroke-width="12"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-dasharray="18 14"
    opacity="0.82"
  />

  <g filter="url(#textShadow)">
    <text x="450" y="365" text-anchor="middle" font-family="SF Pro Display, SF Pro Text, PingFang SC, sans-serif" font-size="20" font-weight="650" fill="#7F8796">
      Drag Timing Lite into Applications
    </text>
    <text x="450" y="394" text-anchor="middle" font-family="SF Pro Text, PingFang SC, sans-serif" font-size="13" font-weight="500" fill="#A2A9B7">
      Install once, then open it from Applications or Launchpad
    </text>
  </g>
